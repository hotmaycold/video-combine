services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: video_combine
      POSTGRES_USER: video_combine
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
